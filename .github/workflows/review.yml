name: Auto Review Homework

on:
  pull_request_target:
    branches: [master]
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: Claude Agent Review
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      # 1. Checkout code bài tập của học viên
      - name: Checkout student code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: student-code

      # 1b. Checkout master branch (để đọc class.json mới nhất từ teacher)
      - name: Checkout base repo at master
        uses: actions/checkout@v4
        with:
          ref: master
          path: base-code

      # 2. Setup SSH để clone private repo
      - name: Setup SSH Deploy Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.REVIEWER_DEPLOY_KEY }}

      # 3. Clone private repo chứa agent + skills
      - name: Checkout private reviewer repo
        run: git clone git@github.com:${{ secrets.REVIEWER_REPO }} reviewer-core

      # 4. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests --break-system-packages

      # 5. Chạy Claude Agent review
      - name: Run Review Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          PR_REPO:           ${{ github.repository }}
          PR_BRANCH:         ${{ github.event.pull_request.head.ref }}
          PR_AUTHOR:         ${{ github.event.pull_request.user.login }}
          PR_TITLE:          ${{ github.event.pull_request.title }}
          STUDENT_CODE_PATH: student-code
          BASE_CODE_PATH:    base-code
        run: python reviewer-core/reviewer/review_pr.py
